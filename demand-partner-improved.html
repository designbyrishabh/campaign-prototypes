<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Demand Partner — improved</title>
<style>
  :root {
    --brand: #7c5cff;
    --brand-strong: #6d4fe8;
    --brand-50: #f4f1fe;
    --brand-100: #ebe6ff;
    --text: #1f2430;
    --text-sec: #4a5163;
    --text-ter: #9aa0b0;
    --border: #e5e7eb;
    --border-strong: #d6d9e0;
    --bg: #ffffff;
    --bg-light: #f4f6f8;
    --red: #e0392b;
    --r-sm: 6px;
    --r-md: 8px;
    --r-lg: 12px;
    --r-full: 999px;
    --shadow-card: 0 1px 2px rgba(16, 24, 40, .04), 0 6px 20px rgba(16, 24, 40, .04);
    --font: "Inter", -apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    color: var(--text);
    background: var(--bg-light);
    -webkit-font-smoothing: antialiased;
    padding: 40px 24px;
  }

  .stack { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; gap: 32px; }
  .stack-title { font-size: 13px; font-weight: 600; color: var(--text-ter); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }

  .card {
    background: var(--bg);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-card);
    padding: 24px 28px;
  }

  /* --- field label --- */
  .label-row {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
    margin-bottom: 6px;
  }
  .label {
    font-size: 15px; font-weight: 700; color: var(--text);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .req { color: var(--red); font-weight: 700; }
  .desc {
    font-size: 13px; color: var(--text-sec); margin: 0 0 14px;
  }
  .desc a { color: var(--brand-strong); font-weight: 600; text-decoration: none; }
  .desc a:hover { text-decoration: underline; }

  /* --- inline activate toggle (in label row) --- */
  .activate-inline {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 4px 10px 4px 12px;
    border-radius: var(--r-full);
    background: var(--brand-50);
    border: 1px solid transparent;
    cursor: pointer;
    transition: background .15s ease, border-color .15s ease;
  }
  .activate-inline:hover { background: var(--brand-100); }
  .activate-inline .bolt {
    width: 14px; height: 14px; color: var(--brand-strong); flex: none;
  }
  .activate-inline .t {
    font-size: 12px; font-weight: 600; color: var(--brand-strong);
    letter-spacing: .01em;
  }

  /* compact switch */
  .switch-sm { position: relative; display: inline-block; width: 30px; height: 18px; flex: none; }
  .switch-sm input { opacity: 0; width: 0; height: 0; }
  .switch-sm .slider {
    position: absolute; inset: 0; cursor: pointer;
    background: #cdd1da; border-radius: var(--r-full);
    transition: background .18s ease;
  }
  .switch-sm .slider::before {
    content: ""; position: absolute; height: 14px; width: 14px;
    left: 2px; top: 2px; background: #fff; border-radius: 50%;
    box-shadow: 0 1px 2px rgba(16,24,40,.2);
    transition: transform .18s ease;
  }
  .switch-sm input:checked + .slider { background: var(--brand); }
  .switch-sm input:checked + .slider::before { transform: translateX(12px); }

  /* --- multi-select with chips inside --- */
  .multiselect {
    width: 100%;
    min-height: 52px;
    display: flex; align-items: center; gap: 8px;
    border: 1.5px solid var(--border); border-radius: var(--r-md);
    padding: 8px 12px 8px 14px;
    background: var(--bg);
    cursor: text;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .multiselect:hover { border-color: var(--border-strong); }
  .multiselect:focus-within { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-50); }

  .ms-chips {
    display: flex; flex-wrap: wrap; gap: 6px; flex: 1; align-items: center;
  }
  .ms-chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--bg-light);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 4px 4px 4px 10px;
    font-size: 13px; font-weight: 500; color: var(--text);
    line-height: 1.4;
  }
  .ms-chip button {
    width: 18px; height: 18px; display: grid; place-items: center;
    border: none; background: transparent; color: var(--text-ter);
    cursor: pointer; border-radius: 3px; padding: 0;
  }
  .ms-chip button:hover { color: var(--text); background: rgba(16, 24, 40, .06); }
  .ms-input {
    flex: 1; min-width: 120px;
    border: none; outline: none; background: transparent;
    font: inherit; color: var(--text); padding: 6px 0;
  }
  .ms-input::placeholder { color: var(--text-ter); }
  .ms-meta { display: flex; align-items: center; gap: 10px; color: var(--text-ter); }
  .ms-count { font-size: 12px; font-weight: 600; }
  .ms-caret { width: 18px; height: 18px; }

  /* --- disabled state when activate is on --- */
  .field-body { transition: opacity .18s ease; }
  .field-body.disabled { opacity: .55; pointer-events: none; user-select: none; }

  .activate-banner {
    display: none;
    margin-top: 10px;
    padding: 10px 14px;
    background: var(--brand-50);
    border: 1px solid var(--brand-100);
    border-radius: var(--r-md);
    font-size: 13px; color: var(--text-sec);
  }
  .activate-banner.on { display: block; }
  .activate-banner b { color: var(--brand-strong); font-weight: 600; }
</style>
</head>
<body>

<div class="stack">

  <!-- Improved version -->
  <div>
    <div class="stack-title">Improved</div>
    <div class="card">
      <div class="label-row">
        <span class="label">Demand Partner <span class="req">*</span></span>
        <label class="activate-inline" for="activate-2">
          <svg class="bolt" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 4 14h7l-1 8 9-12h-7z"/></svg>
          <span class="t">Activate via Select</span>
          <span class="switch-sm">
            <input type="checkbox" id="activate-2" />
            <span class="slider"></span>
          </span>
        </label>
      </div>
      <p class="desc">Ad networks or exchanges that help publishers sell ad space. <a href="#">Learn more</a></p>

      <div class="field-body" id="body-2">
        <div class="multiselect" onclick="document.getElementById('ms-input-2').focus()">
          <div class="ms-chips">
            <span class="ms-chip">Amazon DSP
              <button aria-label="Remove Amazon DSP" onclick="this.parentElement.remove(); updateCount()">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 6l12 12M18 6 6 18"/></svg>
              </button>
            </span>
            <span class="ms-chip">Viant
              <button aria-label="Remove Viant" onclick="this.parentElement.remove(); updateCount()">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 6l12 12M18 6 6 18"/></svg>
              </button>
            </span>
            <span class="ms-chip">Quantcast
              <button aria-label="Remove Quantcast" onclick="this.parentElement.remove(); updateCount()">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 6l12 12M18 6 6 18"/></svg>
              </button>
            </span>
            <input class="ms-input" id="ms-input-2" placeholder="Search partners…" />
          </div>
          <div class="ms-meta">
            <span class="ms-count" id="count">3</span>
            <svg class="ms-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
          </div>
        </div>

        <div class="activate-banner" id="banner">
          <b>Select Activation is on.</b> Demand will be managed by the Activate module — this field is read-only.
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  const cb = document.getElementById('activate-2');
  const body = document.getElementById('body-2');
  const banner = document.getElementById('banner');
  cb.addEventListener('change', () => {
    body.querySelector('.multiselect').classList.toggle('disabled', cb.checked);
    body.classList.toggle('disabled', false); // keep banner visible
    body.querySelector('.multiselect').style.opacity = cb.checked ? '.55' : '';
    body.querySelector('.multiselect').style.pointerEvents = cb.checked ? 'none' : '';
    banner.classList.toggle('on', cb.checked);
  });
  function updateCount() {
    const n = document.querySelectorAll('#body-2 .ms-chip').length;
    document.getElementById('count').textContent = n;
  }
</script>

</body>
</html>
