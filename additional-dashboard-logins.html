<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Additional Dashboard Logins</title>
<style>
  :root {
    --text: #1f2937;
    --text-muted: #4b5563;
    --text-subtle: #9ca3af;
    --required: #dc2626;
    --border: #d1d5db;
    --border-light: #e5e7eb;
    --card-bg: #f3f4f6;
    --primary: #2563eb;
    --input-bg: #ffffff;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #ffffff;
    color: var(--text);
    padding: 48px 32px;
    line-height: 1.5;
  }

  .wrapper { max-width: 920px; margin: 0 auto; }

  .title {
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 8px;
    color: var(--text);
  }

  .subtitle {
    font-size: 15px;
    color: var(--text-muted);
    margin: 0 0 24px;
  }

  .login-card {
    background: var(--card-bg);
    border: 1px solid var(--border-light);
    border-radius: 10px;
    padding: 16px 56px 16px 20px;
    position: relative;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .close-btn {
    position: absolute;
    top: 50%;
    right: 16px;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    cursor: pointer;
    color: #6b7280;
    padding: 4px;
    line-height: 0;
  }
  .close-btn svg { width: 18px; height: 18px; }
  .close-btn:hover { color: var(--text); }

  .email-input {
    flex: 1;
    min-width: 0;
    height: 44px;
    padding: 0 14px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 15px;
    color: var(--text);
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .email-input::placeholder { color: var(--text-subtle); }
  .email-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
  }

  .admin-group {
    display: flex;
    align-items: center;
    height: 44px;
    padding: 0 16px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    gap: 10px;
    flex-shrink: 0;
    transition: border-color 0.15s ease, background 0.15s ease;
    user-select: none;
  }

  .admin-group:hover { border-color: #9ca3af; }

  .admin-group:has(input:checked) {
    border-color: var(--primary);
    background: #eff6ff;
  }

  .admin-checkbox {
    appearance: none;
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    margin: 0;
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
    background: var(--input-bg);
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .admin-checkbox:checked {
    background: var(--primary);
    border-color: var(--primary);
  }

  .admin-checkbox:checked::after {
    content: "";
    position: absolute;
    left: 5px;
    top: 1.5px;
    width: 5px;
    height: 10px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  .admin-label {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
  }

  .add-btn {
    width: 100%;
    padding: 18px;
    background: transparent;
    border: 1.5px dashed var(--primary);
    border-radius: 10px;
    color: var(--primary);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s ease;
  }

  .add-btn:hover { background: #eff6ff; }

  @media (max-width: 700px) {
    .row { grid-template-columns: 1fr; gap: 20px; }
    .admin-group { min-width: 0; padding-right: 0; }
  }
</style>
</head>
<body>
  <div class="wrapper">
    <h1 class="title">Additional Dashboard Logins (optional)</h1>
    <p class="subtitle">Add team members who need access to the media.net dashboard, and specify their permission level.</p>

    <div id="logins"></div>

    <button class="add-btn" onclick="addRow()">+ Add another Login</button>
  </div>

  <template id="row-template">
    <div class="login-card">
      <button class="close-btn" title="Remove" onclick="removeRow(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <input type="email" class="email-input" placeholder="colleague@example.com" />
      <label class="admin-group">
        <input type="checkbox" class="admin-checkbox" />
        <span class="admin-label">Admin Access</span>
      </label>
    </div>
  </template>

  <script>
    const list = document.getElementById('logins');
    const template = document.getElementById('row-template');
    let counter = 0;

    function addRow() {
      counter++;
      const clone = template.content.cloneNode(true);
      const card = clone.querySelector('.login-card');
      card.querySelectorAll('input[type="radio"]').forEach(r => {
        r.name = `admin-${counter}`;
      });
      list.appendChild(clone);
    }

    function removeRow(btn) {
      const cards = list.querySelectorAll('.login-card');
      if (cards.length === 1) {
        const card = btn.closest('.login-card');
        card.querySelector('.email-input').value = '';
        card.querySelectorAll('input[type="radio"]').forEach((r, i) => { r.checked = i === 1; });
        return;
      }
      btn.closest('.login-card').remove();
    }

    addRow();
  </script>
</body>
</html>
